$kind: http-request
name: Get User Activity
method: GET
url: '{{baseUrl}}/api/user-activity'
order: 2000
description: |-
  Returns running sessions between startWeek and endWeek dates.
  
  **Query Parameters:**
  - startWeek (required): Start date in ISO format (e.g., 2025-01-01)
  - endWeek (required): End date in ISO format (e.g., 2025-12-31)
  
  **Response:** Array of running sessions with date, distance, duration, heartRate, and caloriesBurned
headers:
  - key: Content-Type
    value: application/json
queryParams:
  - key: startWeek
    value: '2025-01-01'
    description: Start date for filtering sessions (ISO format)
  - key: endWeek
    value: '2025-12-31'
    description: End date for filtering sessions (ISO format)
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
